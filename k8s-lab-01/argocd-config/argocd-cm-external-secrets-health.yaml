apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  resource.customizations.health.external-secrets.io_ClusterSecretStore: |
    hs = {}
    if obj.status and obj.status.conditions then
      for _, condition in ipairs(obj.status.conditions) do
        if condition.type == "Ready" then
          if condition.status == "True" then
            hs.status = "Healthy"
            hs.message = condition.message or "Ready"
            return hs
          end
          hs.status = "Degraded"
          hs.message = condition.message or "Not ready"
          return hs
        end
      end
    end
    hs.status = "Progressing"
    hs.message = "Waiting for Ready condition"
    return hs
  resource.customizations.health.external-secrets.io_ExternalSecret: |
    hs = {}
    if obj.status and obj.status.conditions then
      for _, condition in ipairs(obj.status.conditions) do
        if condition.type == "Ready" then
          if condition.status == "True" then
            hs.status = "Healthy"
            hs.message = condition.message or "Ready"
            return hs
          end
          hs.status = "Degraded"
          hs.message = condition.message or "Not ready"
          return hs
        end
      end
    end
    hs.status = "Progressing"
    hs.message = "Waiting for Ready condition"
    return hs
