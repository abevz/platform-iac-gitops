apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: democicd
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-lab
  source:
    repoURL: https://github.com/abevz/platform-iac-gitops.git
    path: k8s-lab-01/democicd
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
