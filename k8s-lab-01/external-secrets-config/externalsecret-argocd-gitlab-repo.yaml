apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-gitlab-repo
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: argocd-gitlab-repo
    creationPolicy: Owner
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        type: git
        url: https://github.com/abevz/platform-iac-gitops.git
        username: argocd
        password: "{{ .token }}"
  data:
    - secretKey: token
      remoteRef:
        key: platform/gitlab
        property: argocd-token
